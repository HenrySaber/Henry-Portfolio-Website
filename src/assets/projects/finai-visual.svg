<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sphereGradient" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#a0a0a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#707070;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Metallic sphere base -->
  <circle cx="100" cy="100" r="95" fill="url(#sphereGradient)" filter="url(#shadow)"/>
  
  <!-- Sphere highlight -->
  <ellipse cx="75" cy="70" rx="35" ry="40" fill="white" opacity="0.25"/>
  
  <!-- Ring accent -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#textGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Text: FinAI -->
  <text x="100" y="115" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="url(#textGradient)" letter-spacing="-1">FinAI</text>
  
  <!-- Subtle accent dots -->
  <circle cx="50" cy="50" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="150" cy="150" r="3" fill="#5b21b6" opacity="0.4"/>
</svg>